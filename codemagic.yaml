workflows:
  flex-yemen-supabase:
    name: 🔥 Flex Yemen مع Supabase
    max_build_duration: 45
    instance_type: mac_mini_m1
    
    environment:
      vars:
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        APP_VERSION: 1.0.0
        APP_BUILD_NUMBER: ${CM_BUILD_NUMBER}
        
      flutter: stable
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: 🔧 تنظيف
        script: flutter clean
        
      - name: 📥 تحميل التبعيات
        script: flutter pub get
        
      - name: 🔍 تحليل الكود
        script: flutter analyze
        
      - name: 🔨 بناء APK
        script: |
          flutter build apk --release \
            --build-name=$APP_VERSION \
            --build-number=$APP_BUILD_NUMBER \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          
      - name: 📦 بناء AppBundle
        script: |
          flutter build appbundle --release \
            --build-name=$APP_VERSION \
            --build-number=$APP_BUILD_NUMBER \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
    
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      
    publishing:
      email:
        recipients:
          - almwld@gmail.com
        notify:
          success: true
          failure: true

  flex-yemen-nightly:
    name: 🌙 Nightly Build
    max_build_duration: 30
    instance_type: mac_mini
    
    environment:
      vars:
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      flutter: stable
    
    triggering:
      schedule:
        - cron: "0 2 * * *"
        - branch_patterns:
            - pattern: 'main'
              include: true
    
    scripts:
      - name: 🔨 بناء APK ليلي
        script: |
          flutter build apk --release \
            --build-name=nightly-$(date +%Y%m%d) \
            --build-number=$CM_BUILD_NUMBER \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
    
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
    publishing:
      email:
        recipients:
          - almwld@gmail.com
        notify:
          success: true
          failure: true

cache:
  cache_paths:
    - $FLUTTER_ROOT/.pub-cache
    - $CM_BUILD_DIR/.dart_tool
